  <!-- Additional Open Graph tags for better sharing -->
  <meta property="og:site_name" content="Capital Motor Cars">
  <meta property="og:locale" content="en_US">
  
  <!-- Structured data for better SEO -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "AutomotiveBusiness",
    "name": "Capital Motor Cars",
    "description": "Capital Motor Cars helps you lease, finance, and take care of your vehicle with a clear process and personal support. No stress, no games.",
    "url": "",
    "logo": "/logo.png",
    "image": "/shared-img.png",
    "sameAs": [
      "https://www.instagram.com/capitalmotorcars",
      "https://www.facebook.com/capitalmotorcars"
    ]
  }
  </script>
  
  <!-- Dynamic URL updates for sharing -->
  <script>
    // Update meta tags with current URL for proper sharing
    document.addEventListener('DOMContentLoaded', function() {
      const currentUrl = window.location.href;
      const origin = window.location.origin;
      
      // Update Open Graph URL
      const ogUrl = document.querySelector('meta[property="og:url"]');
      if (ogUrl) ogUrl.content = currentUrl;
      
      // Update structured data URL
      const structuredData = document.querySelector('script[type="application/ld+json"]');
      if (structuredData) {
        const data = JSON.parse(structuredData.textContent);
        data.url = currentUrl;
        data.logo = origin + '/logo.png';
        data.image = origin + '/shared-img.png';
        structuredData.textContent = JSON.stringify(data);
      }
      
      // Update image URLs
      const ogImage = document.querySelector('meta[property="og:image"]');
      const twitterImage = document.querySelector('meta[name="twitter:image"]');
      const appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
      const favicon = document.querySelector('link[rel="icon"]');
      
      if (ogImage) ogImage.content = origin + '/shared-img.png';
      if (twitterImage) twitterImage.content = origin + '/shared-img.png';
      if (appleIcon) appleIcon.href = origin + '/logo.png';
      if (favicon) favicon.href = origin + '/logo.png';
    });
  </script>
  <link rel="icon" type="image/png" href="/logo.png">
